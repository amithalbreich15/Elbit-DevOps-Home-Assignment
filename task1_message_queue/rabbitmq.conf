# rabbitmq.conf – production-friendly defaults for development
# See: https://www.rabbitmq.com/configure.html

# Persist messages to disk (extra safety on top of delivery_mode=2)
vm_memory_high_watermark.relative = 0.6
disk_free_limit.relative = 1.5

# Heartbeat – keeps connections alive through NAT/firewalls
heartbeat = 60

# Default virtual host and user are fine for development
# For production: create dedicated vhost + non-guest user via management API
