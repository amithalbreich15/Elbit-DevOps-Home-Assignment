name: CI - Validate Assignments

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  PYTHONUNBUFFERED: "1"

jobs:
  task1-tests:
    name: Task 1 - RabbitMQ Publisher / Consumer
    runs-on: ubuntu-latest

    services:
      rabbitmq:
        image: rabbitmq:3.13-management-alpine
        ports:
          - 5672:5672
          - 15672:15672
        env:
          RABBITMQ_DEFAULT_USER: guest
          RABBITMQ_DEFAULT_PASS: guest
        options: >-
          --health-cmd "rabbitmq-diagnostics -q ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
          --health-start-period 20s

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Task 1 dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r task1_message_queue/requirements.txt
          pip install pylint

      - name: Syntax check Task 1
        run: |
          python -m py_compile task1_message_queue/publisher.py
          python -m py_compile task1_message_queue/consumer.py

      - name: Lint Task 1 report
        run: |
          pylint task1_message_queue/publisher.py task1_message_queue/consumer.py \
            --disable=C0114,C0115,C0116,R0903,W1203,W0718 \
            --exit-zero

      - name: Wait for RabbitMQ
        run: |
          for i in {1..30}; do
            if nc -z localhost 5672; then
              echo "RabbitMQ is ready"
              exit 0
            fi
            echo "Waiting for RabbitMQ..."
            sleep 2
          done
          echo "RabbitMQ did not become ready in time"
          exit 1

      - name: Smoke test publisher and consumer
        env:
          RABBITMQ_HOST: localhost
          RABBITMQ_PORT: "5672"
          RABBITMQ_USER: guest
          RABBITMQ_PASS: guest
          QUEUE_NAME: ABC
          DLQ_NAME: ABC.dlq
          NUM_MESSAGES: "3"
          MESSAGE_DELAY: "0"
          MAX_RETRIES: "5"
          RETRY_BACKOFF: "1"
          PREFETCH_COUNT: "1"
        run: |
          set -e

          python task1_message_queue/consumer.py > consumer.log 2>&1 &
          CONSUMER_PID=$!

          sleep 5

          python task1_message_queue/publisher.py

          sleep 3

          kill "$CONSUMER_PID" || true
          cat consumer.log

          grep "Message #003" consumer.log

  task2-tests:
    name: Task 2 - CPU Monitor
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Task 2 dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r task2_cpu_monitor/requirements.txt
          pip install pylint

      - name: Syntax check CPU monitor
        run: |
          python -m py_compile task2_cpu_monitor/cpu_monitor.py

      - name: Lint Task 2 report
        run: |
          pylint task2_cpu_monitor/cpu_monitor.py \
            --disable=C0114,C0115,C0116,R0903,W1203,W0718 \
            --exit-zero

      - name: Smoke test CPU monitor
        env:
          CPU_THRESHOLD: "100"
          CHECK_INTERVAL: "1"
          METRICS_ENABLED: "false"
          LOG_FILE: "/tmp/cpu_monitor.log"
          SMTP_HOST: ""
          SMTP_PORT: "587"
          SMTP_USER: ""
          SMTP_PASS: ""
          ALERT_FROM: ""
          ALERT_TO: ""
        run: |
          set +e
          timeout 6s python task2_cpu_monitor/cpu_monitor.py
          EXIT_CODE=$?
          set -e

          # timeout returns 124 when the service keeps running normally.
          if [ "$EXIT_CODE" -ne 0 ] && [ "$EXIT_CODE" -ne 124 ]; then
            echo "CPU monitor failed with exit code $EXIT_CODE"
            exit "$EXIT_CODE"
          fi

          echo "CPU monitor smoke test passed"

  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: [task1-tests, task2-tests]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Task 1 image
        run: docker build -t devops-task1:ci task1_message_queue/

      - name: Build Task 2 image
        run: docker build -t devops-task2:ci task2_cpu_monitor/
